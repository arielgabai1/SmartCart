[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    p0: Critical tests - run every commit
    p1: High priority - run on PR
    p2: Medium priority - run nightly
    p3: Low priority - run on-demand
    api: API integration tests
    unit: Unit tests
