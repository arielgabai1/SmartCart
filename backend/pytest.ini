[pytest]
testpaths = tests
addopts = -v --tb=short --strict-markers --cov=src --cov-report=term-missing --cov-report=html --cov-fail-under=70
markers =
    p0: Critical - run every commit
    p1: High priority - run on PR
    p2: Medium priority - nightly
    p3: Low priority - on-demand
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    resilience: Resilience and failure mode tests
