services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: on-failure
    networks:
      - shop-net

  backend:
    build: ./backend
    ports:
      - "8081:8081"
    environment:
      - MONGO_URI=mongodb://database:27017/smart-shop
    depends_on:
      - database
    restart: on-failure
    networks:
      - shop-net

  database:
    image: mongo:6.0
    volumes:
      - ./data:/data/db
    restart: on-failure
    networks:
      - shop-net

networks:
  shop-net:
    driver: bridge
