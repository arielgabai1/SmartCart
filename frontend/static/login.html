<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In | SmartCart</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: var(--shadow-subtle);
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem;
                border-radius: var(--radius-md);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .auth-footer {
            margin-top: 2rem;
        }

        .btn-secondary {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-secondary:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }
    </style>
</head>

<body class="light-mode">
    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <h1>SmartCart</h1>
                <p>Welcome back!</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem;">
                    Sign In
                </button>
            </form>

            <div class="auth-footer">
                <a href="register.html" class="btn-secondary">New here? Get Started</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (res.ok) {
                    const { token } = await res.json();
                    localStorage.setItem('sc_token', token);
                    window.location.href = 'index.html';
                } else {
                    const err = await res.json();
                    alert(err.details || 'Invalid credentials');
                }
            } catch (e) {
                alert('Network error. Please try again.');
            }
        });
    </script>
</body>

</html>
