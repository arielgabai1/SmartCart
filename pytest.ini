[pytest]
testpaths = tests
python_files = test_*.py *_test.py *_tests.py
addopts = -v --tb=short --strict-markers --cov=src --cov-fail-under=70
markers =
    p0: Critical - run every commit
    p1: High priority - run on PR
    p2: Medium priority - nightly
    p3: Low priority - on-demand
    unit: Unit tests
    integration: Integration tests
