<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Get Started | SmartCart</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 460px;
        }

        .auth-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: var(--shadow-subtle);
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem;
                border-radius: var(--radius-md);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .toggle-container {
            display: flex;
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
            padding: 0.25rem;
            margin-bottom: 1.5rem;
            gap: 0.25rem;
        }

        .toggle-btn {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 500;
            transition: all var(--transition-fast);
            color: var(--text-secondary);
            border: none;
            background: none;
        }

        .toggle-btn.active {
            background: var(--accent-primary);
            color: white;
        }

        .toggle-btn:hover:not(.active) {
            color: var(--text-primary);
        }

        .auth-footer {
            margin-top: 2rem;
        }

        .btn-secondary {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-secondary:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }
    </style>
</head>

<body class="light-mode">
    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <h1>SmartCart</h1>
                <p id="auth-subtitle">Start your shopping group</p>
            </div>

            <div class="toggle-container">
                <button id="btn-new" class="toggle-btn active">New Group</button>
                <button id="btn-join" class="toggle-btn">Join Existing</button>
            </div>

            <form id="register-form">
                <div id="field-group" class="form-group">
                    <label class="form-label" for="group_name">Group Name</label>
                    <input type="text" id="group_name" class="form-input">
                </div>
                <div id="field-code" class="form-group hidden">
                    <label class="form-label" for="join_code">Invite Code</label>
                    <input type="text" id="join_code" class="form-input" style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <label class="form-label" for="user_name">Your Name</label>
                    <input type="text" id="user_name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem;">
                    Get Started
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html" class="btn-secondary">Already have an account? Sign In</a>
            </div>
        </div>
    </div>

    <script>
        let mode = 'new';
        const btnNew = document.getElementById('btn-new');
        const btnJoin = document.getElementById('btn-join');
        const fieldGroup = document.getElementById('field-group');
        const fieldCode = document.getElementById('field-code');
        const subtitle = document.getElementById('auth-subtitle');

        btnNew.addEventListener('click', () => setMode('new'));
        btnJoin.addEventListener('click', () => setMode('join'));

        function setMode(m) {
            mode = m;
            btnNew.classList.toggle('active', m === 'new');
            btnJoin.classList.toggle('active', m === 'join');
            fieldGroup.classList.toggle('hidden', m === 'join');
            fieldCode.classList.toggle('hidden', m === 'new');
            subtitle.textContent = m === 'new' ? 'Start your shopping group' : 'Join an existing group';

            document.getElementById('group_name').required = (m === 'new');
            document.getElementById('join_code').required = (m === 'join');
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const payload = {
                user_name: document.getElementById('user_name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const endpoint = mode === 'new' ? '/api/auth/register' : '/api/auth/join';

            if (mode === 'new') {
                payload.group_name = document.getElementById('group_name').value;
            } else {
                payload.join_code = document.getElementById('join_code').value.toUpperCase();
            }

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const data = await res.json();
                    if (mode === 'new') {
                        alert(`Group created! Share this invite code: ${data.details.join_code}`);
                    } else {
                        alert('Joined successfully!');
                    }
                    window.location.href = 'login.html';
                } else {
                    const err = await res.json();
                    alert(err.details || 'Registration failed');
                }
            } catch (e) {
                alert('Network error. Please try again.');
            }
        });
    </script>
</body>

</html>
